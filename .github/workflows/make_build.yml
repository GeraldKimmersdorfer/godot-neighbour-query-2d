# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# This workflow is triggered manually on the "Actions" tab on GitHub, and can be used to create releases.

name: Compile and Release
on:
  workflow_dispatch:
    inputs:
      # --- Build targets ---
      linux_x86_64:
        description: 'Linux x86_64'
        type: boolean
        default: true
      linux_arm64:
        description: 'Linux arm64'
        type: boolean
        default: false
      windows_x86_64:
        description: 'Windows x86_64'
        type: boolean
        default: true
      macos_universal:
        description: 'macOS universal'
        type: boolean
        default: false
      android_arm64:
        description: 'Android arm64'
        type: boolean
        default: false
      web_wasm32:
        description: 'Web wasm32'
        type: boolean
        default: false
      target_type:
        description: 'Build type'
        type: choice
        options:
          - both
          - template_debug
          - template_release
        default: both
      float_precision:
        description: 'Float precision'
        type: choice
        options:
          - single
          - double
          - both
        default: single
      release_name:
        description: 'Release name (e.g. v1, empty for no release)'
        type: string
        default: ''
      project_name:
        description: 'Project name'
        type: string
        default: 'NeighbourQuery2D'
      project_dir_name:
        description: 'Project directory name'
        type: string
        default: 'neighbour_query_2d'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: generate
        env:
          IN_LINUX_X86_64:    ${{ inputs.linux_x86_64 }}
          IN_LINUX_ARM64:     ${{ inputs.linux_arm64 }}
          IN_WINDOWS_X86_64:  ${{ inputs.windows_x86_64 }}
          IN_MACOS_UNIVERSAL: ${{ inputs.macos_universal }}
          IN_ANDROID_ARM64:   ${{ inputs.android_arm64 }}
          IN_WEB_WASM32:      ${{ inputs.web_wasm32 }}
          IN_TARGET_TYPE:     ${{ inputs.target_type }}
          IN_FLOAT_PRECISION: ${{ inputs.float_precision }}
        run: |
          python3 << 'EOF'
          import json, os

          def env(key):
              return os.environ[key]

          targets = []
          if env('IN_LINUX_X86_64')    == 'true': targets.append({"platform": "linux",   "arch": "x86_64",   "os": "ubuntu-22.04"})
          if env('IN_LINUX_ARM64')     == 'true': targets.append({"platform": "linux",   "arch": "arm64",    "os": "ubuntu-22.04-arm"})
          if env('IN_WINDOWS_X86_64')  == 'true': targets.append({"platform": "windows", "arch": "x86_64",   "os": "windows-latest"})
          if env('IN_MACOS_UNIVERSAL') == 'true': targets.append({"platform": "macos",   "arch": "universal","os": "macos-latest"})
          if env('IN_ANDROID_ARM64')   == 'true': targets.append({"platform": "android", "arch": "arm64",    "os": "ubuntu-22.04"})
          if env('IN_WEB_WASM32')      == 'true': targets.append({"platform": "web",     "arch": "wasm32",   "os": "ubuntu-22.04"})

          tt = env('IN_TARGET_TYPE')
          target_types = ['template_debug', 'template_release'] if tt == 'both' else [tt]

          fp = env('IN_FLOAT_PRECISION')
          precisions = ['single', 'double'] if fp == 'both' else [fp]

          matrix = {"target": targets, "target-type": target_types, "float-precision": precisions}

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.target.os }}

    steps:
      # Clone this repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Add linux x86_32 toolchain
      - name: Install multilib support
        if: ${{ matrix.target.platform == 'linux' && matrix.target.arch == 'x86_32' }}
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-multilib g++-multilib

      # Setup platform-specific toolchains and SCons
      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          em-version: 3.1.62

      # Restore scons cache (uses SCONS_CACHE env var understood by SCons)
      - name: Restore .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      # Remove only compiled binaries from a previous run, preserving .gdextension and .svg
      - name: Clean previous extension builds
        shell: bash
        run: |
          find bin -mindepth 2 -type f \( \
            -name "*.so" -o -name "*.dll" -o -name "*.pdb" -o -name "*.exp" -o -name "*.lib" \
            -o -name "*.dylib" -o -name "*.wasm" -o -name "*.js" -o -name "*.side.wasm" \
          \) -delete 2>/dev/null || true
          rm -f .sconsign.dblite

      # Build GDExtension
      - name: Build GDExtension
        shell: bash
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
        run: |
          # nproc is Linux-only; macOS uses sysctl
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          scons -j"$JOBS" \
            target=${{ matrix.target-type }} \
            platform=${{ matrix.target.platform }} \
            arch=${{ matrix.target.arch }} \
            precision=${{ matrix.float-precision }}

      # Save scons cache for the next run
      - name: Save .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      # Clean up MSVC-specific linker artifacts
      - name: Windows - Delete compilation files
        if: ${{ matrix.target.platform == 'windows' }}
        shell: pwsh
        run: |
          Remove-Item bin/* -Include *.exp,*.lib,*.pdb -Force -ErrorAction SilentlyContinue

      # Upload per-platform artifact (includes .gdextension and .svg from bin/)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.float-precision }}-${{ matrix.target-type }}
          path: |
            ${{ github.workspace }}/bin/**

  # Merges all per-platform artifacts into a single artifact.
  merge:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: ${{ github.event.repository.name }}
          pattern: ${{ github.event.repository.name }}-*
          delete-merged: true

  # Optionally create a GitHub release and attach the merged artifact.
  release:
    runs-on: ubuntu-22.04
    needs: merge
    if: ${{ inputs.release_name != '' }}
    permissions:
      contents: write
    steps:
      - name: Resolve release description
        id: meta
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          DESCRIPTION="${{ inputs.project_name }} ${{ inputs.release_name }} release at revision [${SHORT_SHA}](${COMMIT_URL})"

          # Write multiline-safe output
          {
            echo "description<<EOF_DESCRIPTION"
            echo "$DESCRIPTION"
            echo "EOF_DESCRIPTION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download merged artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: release-files/

      - name: Create binaries zip
        run: |
          ADDON_DIR="staging/addons/${{ inputs.project_dir_name }}"
          mkdir -p "$ADDON_DIR"

          # Root-level files
          cp README.md staging/
          cp LICENSE.md staging/

          # LICENSE also goes inside the addon folder
          cp LICENSE.md "$ADDON_DIR/"

          # All built artifacts go inside the addon folder
          cp -r release-files/. "$ADDON_DIR/"

          cd staging
          zip -r ../${{ github.event.repository.name }}-${{ inputs.release_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_name }}
          name: ${{ inputs.release_name }}
          body: ${{ steps.meta.outputs.description }}
          files: ${{ github.event.repository.name }}-${{ inputs.release_name }}.zip
